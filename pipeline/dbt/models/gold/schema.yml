version: 2
models:
  - name: dim_country
    columns:
      - name: country_code
        tests:
          - unique
      - name: country_name
        tests:
          - unique
          - not_null
  - name: dim_tool
    columns:
      - name: tool_name
        tests:
          - unique
          - not_null
  - name: fact_job_market
    columns:
      - name: country_name
        tests:
          - not_null
      - name: seniority_level
        tests:
          - not_null
          - accepted_values:
              values: ['entry', 'mid', 'senior']
      - name: job_count
        tests:
          - not_null
  - name: dim_github_repo
    columns:
      - name: repo_full_name
        tests:
          - unique
          - not_null
      - name: cohort
        tests:
          - not_null
      - name: stars
        tests:
          - not_null
  - name: fact_github_repo_trend
    columns:
      - name: repo_full_name
        tests:
          - not_null
      - name: cohort
        tests:
          - not_null
      - name: stars
        tests:
          - not_null
      - name: snapshot_date
        tests:
          - not_null
  - name: fact_github_org_trend
    columns:
      - name: org_name
        tests:
          - not_null
      - name: aggregate_stars
        tests:
          - not_null
      - name: snapshot_date
        tests:
          - not_null
  - name: dim_github_org
    columns:
      - name: org_name
        tests:
          - unique
          - not_null
      - name: aggregate_stars
        tests:
          - not_null
